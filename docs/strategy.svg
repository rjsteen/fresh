<svg width="100%" viewBox="0 0 680 580" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: sans-serif; }
      .th { font-size: 14px; font-weight: 500; fill: #085041; }
      .ts { font-size: 12px; font-weight: 400; fill: #0F6E56; }
      .c-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
      .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
      .c-purple .th { fill: #3C3489; }
      .c-purple .ts { fill: #534AB7; }
      .c-amber rect { fill: #FAEEDA; stroke: #854F0B; }
      .c-amber .th { fill: #633806; }
      .c-amber .ts { fill: #854F0B; }
      .c-gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
      .c-gray .th { fill: #444441; }
      .c-gray .ts { fill: #5F5E5A; }
    </style>
  </defs>

  <!-- Mobile -->
  <g class="c-teal">
    <rect x="40" y="40" width="200" height="160" rx="12" stroke-width="0.5"/>
    <text class="th" x="140" y="70" text-anchor="middle">Mobile</text>
    <text class="ts" x="140" y="88" text-anchor="middle">source of truth</text>
    <rect x="58" y="102" width="164" height="36" rx="6" stroke-width="0.5"/>
    <text class="th" x="140" y="124" text-anchor="middle">SQLCipher (native)</text>
    <rect x="58" y="148" width="164" height="36" rx="6" stroke-width="0.5"/>
    <text class="ts" x="140" y="170" text-anchor="middle">Persists natively on device</text>
  </g>

  <!-- User cloud storage -->
  <g class="c-amber">
    <rect x="250" y="40" width="180" height="90" rx="12" stroke-width="0.5"/>
    <text class="th" x="340" y="68" text-anchor="middle">User cloud storage</text>
    <text class="ts" x="340" y="86" text-anchor="middle">Dropbox / iCloud / GDrive</text>
    <text class="ts" x="340" y="104" text-anchor="middle">encrypted SQLite blob</text>
  </g>

  <!-- Web browser -->
  <g class="c-purple">
    <rect x="440" y="40" width="200" height="160" rx="12" stroke-width="0.5"/>
    <text class="th" x="540" y="70" text-anchor="middle">Web browser</text>
    <text class="ts" x="540" y="88" text-anchor="middle">convenience view</text>
    <rect x="458" y="102" width="164" height="36" rx="6" stroke-width="0.5"/>
    <text class="th" x="540" y="124" text-anchor="middle">OPFS + WASM SQLite</text>
    <rect x="458" y="148" width="164" height="36" rx="6" stroke-width="0.5"/>
    <text class="ts" x="540" y="170" text-anchor="middle">Persists across sessions</text>
  </g>

  <!-- Mobile -> cloud (backup) -->
  <line x1="240" y1="90" x2="250" y2="80" stroke="#1D9E75" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="224" y="68" text-anchor="middle" font-size="12" fill="#0F6E56" font-family="sans-serif">backup</text>

  <!-- Cloud -> web (hydrate) -->
  <line x1="430" y1="80" x2="440" y2="90" stroke="#534AB7" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="456" y="68" text-anchor="middle" font-size="12" fill="#534AB7" font-family="sans-serif">hydrate</text>

  <!-- Web -> cloud (delta push) -->
  <line x1="440" y1="110" x2="430" y2="100" stroke="#534AB7" stroke-width="1.5" fill="none" marker-end="url(#arrow)" stroke-dasharray="4 3"/>
  <text x="456" y="114" text-anchor="middle" font-size="12" fill="#534AB7" font-family="sans-serif">delta push</text>

  <!-- Delta sync box -->
  <g class="c-gray">
    <rect x="250" y="170" width="180" height="60" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="196" text-anchor="middle">Delta sync</text>
    <text class="ts" x="340" y="214" text-anchor="middle">full file pulled once only</text>
    <text class="ts" x="340" y="228" text-anchor="middle">small changes pushed after</text>
  </g>
  <line x1="340" y1="130" x2="340" y2="170" stroke="#B4B2A9" stroke-width="1" fill="none" marker-end="url(#arrow)"/>

  <!-- Mobile storage detail -->
  <g class="c-teal">
    <rect x="40" y="300" width="200" height="120" rx="12" stroke-width="0.5"/>
    <text class="th" x="140" y="326" text-anchor="middle">Mobile storage</text>
    <text class="ts" x="140" y="346" text-anchor="middle">op-sqlite + SQLCipher</text>
    <text class="ts" x="140" y="362" text-anchor="middle">Passphrase encrypted</text>
    <text class="ts" x="140" y="378" text-anchor="middle">OS backup automatic</text>
    <text class="ts" x="140" y="394" text-anchor="middle">Cloud backup optional</text>
  </g>

  <!-- Web storage detail -->
  <g class="c-purple">
    <rect x="440" y="300" width="200" height="120" rx="12" stroke-width="0.5"/>
    <text class="th" x="540" y="326" text-anchor="middle">Web storage</text>
    <text class="ts" x="540" y="346" text-anchor="middle">OPFS persistent cache</text>
    <text class="ts" x="540" y="362" text-anchor="middle">First load: full file pull</text>
    <text class="ts" x="540" y="378" text-anchor="middle">After: deltas only</text>
    <text class="ts" x="540" y="394" text-anchor="middle">No binary files in DB</text>
  </g>

  <!-- File size note -->
  <g class="c-gray">
    <rect x="250" y="300" width="180" height="120" rx="12" stroke-width="0.5"/>
    <text class="th" x="340" y="326" text-anchor="middle">File size control</text>
    <text class="ts" x="340" y="346" text-anchor="middle">Receipts stored externally</text>
    <text class="ts" x="340" y="362" text-anchor="middle">DB holds path refs only</text>
    <text class="ts" x="340" y="378" text-anchor="middle">5yr transactions ≈ 5–10MB</text>
    <text class="ts" x="340" y="394" text-anchor="middle">Archive cold data yearly</text>
  </g>

  <!-- Phoenix backend -->
  <g class="c-gray">
    <rect x="40" y="462" width="600" height="80" rx="12" stroke-width="0.5"/>
    <text class="th" x="340" y="490" text-anchor="middle">Phoenix backend (cloud hosted)</text>
    <text class="ts" x="340" y="510" text-anchor="middle">Bank polling · push relay · ML model distribution · alert tokens</text>
    <text class="ts" x="340" y="528" text-anchor="middle">Zero financial data stored — cannot leak user data even if breached</text>
  </g>

  <line x1="140" y1="420" x2="140" y2="462" stroke="#B4B2A9" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
  <line x1="340" y1="420" x2="340" y2="462" stroke="#B4B2A9" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
  <line x1="540" y1="420" x2="540" y2="462" stroke="#B4B2A9" stroke-width="1" fill="none" marker-end="url(#arrow)"/>
</svg>
